name: tucuvpn
description: TucuVPN – Android TV / Fire TV / BTV Box VPN client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  openvpn_flutter: ^1.3.4
  android_intent_plus: ^5.0.0
  shared_preferences: ^2.3.2
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  package_info_plus: ^8.0.0
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/configs/
