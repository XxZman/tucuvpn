plugins {
    id "com.android.application"
    id "kotlin-android"
    // Flutter Gradle Plugin must come after the Android and Kotlin plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.tucuvpn.tucuvpn"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
        main {
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }

    defaultConfig {
        applicationId "com.tucuvpn.tucuvpn"
        minSdk 21
        targetSdk 33
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    packagingOptions {
        pickFirst '**/libopenvpn.so'
        pickFirst '**/libovpnexec.so'
        pickFirst '**/libovpn3.so'
        pickFirst '**/libovpnutil.so'
        pickFirst '**/libosslutil.so'
        pickFirst '**/libosslspeedtest.so'
    }
}

flutter {
    source "../.."
}

dependencies {
    // ics-openvpn via JitPack. schwabe/ics-openvpn is an app project with NDK
    // dependencies that JitPack cannot build. This nizwar fork is the only
    // published AAR on JitPack that provides de.blinkt.openvpn.core.* classes.
    // Our VpnHelper.kt bypasses nizwar's VPNHelper wrapper and uses the core
    // ics-openvpn API (ConfigParser, VpnProfile, VPNLaunchHelper, VpnStatus)
    // directly, so we get reliable OpenVPN behaviour without the nizwar glue.
    implementation 'com.github.nizwar:openvpn_library:b3941ef040'
}
