plugins {
    id "com.android.application"
    id "kotlin-android"
    // Flutter Gradle Plugin must come after the Android and Kotlin plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.tucuvpn.tucuvpn"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
        main {
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }

    defaultConfig {
        applicationId "com.tucuvpn.tucuvpn"
        minSdk 21
        targetSdk 33
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    packagingOptions {
        pickFirst '**/libopenvpn.so'
        pickFirst '**/libovpnexec.so'
        pickFirst '**/libovpn3.so'
        pickFirst '**/libovpnutil.so'
        pickFirst '**/libosslutil.so'
        pickFirst '**/libosslspeedtest.so'
    }
}

flutter {
    source "../.."
}

dependencies {
    // ics-openvpn pre-built AAR (schwabe/ics-openvpn v0.7.33 via JitPack).
    // This is the upstream project by Arne Schwabe — not the broken nizwar fork.
    implementation 'com.github.schwabe:ics-openvpn:v0.7.33'
}
